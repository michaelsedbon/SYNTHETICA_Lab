[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328  ; OLD bootloader (57600 baud) — confirmed working
framework = arduino
upload_port = /dev/cu.usbserial-2140
upload_speed = 57600
monitor_speed = 115200
monitor_port = /dev/cu.usbserial-2140
lib_deps =
    waspinator/AccelStepper@^1.64

; Specialized environment for DM542T boards (D4=Step, D2=Dir, NC=Enable)
[env:dm542t]
platform = atmelavr
board = nanoatmega328new
framework = arduino
build_flags = 
    -DPIN_STEP=4
    -DPIN_DIR=2
    -DPIN_ENABLE=-1
lib_deps =
    waspinator/AccelStepper@^1.64
