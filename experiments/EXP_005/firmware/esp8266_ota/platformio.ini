[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_port = /dev/cu.usbserial-2130
upload_speed = 115200
monitor_speed = 115200
monitor_port = /dev/cu.usbserial-2130
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    links2004/WebSockets@^2.4.1

; Specialized OTA environment for Board 3
[env:board3]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_protocol = espota
upload_port = cryptobeings-3.local
upload_flags = --port=8266
build_flags = -DWIFI_HOSTNAME=\"cryptobeings-3\"
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    links2004/WebSockets@^2.4.1

; Specialized OTA environment for Board 4
[env:board4]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_protocol = espota
upload_port = cryptobeings-4.local
upload_flags = --port=8266
build_flags = -DWIFI_HOSTNAME=\"cryptobeings-4\"
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    links2004/WebSockets@^2.4.1
