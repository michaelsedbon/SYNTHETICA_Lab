[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_port = /dev/cu.usbserial-2130
upload_speed = 115200
monitor_speed = 115200
monitor_port = /dev/cu.usbserial-2130

; OTA environment — use this for wireless updates
[env:ota]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_protocol = espota
upload_port = 172.16.1.115
upload_flags = --port=8266
