; ============================================================
; EXP_009 — 8-Channel LED Driver Board Firmware
; ESP32-S3-WROOM-1 + PCA9685 + 8× DRV8870
; ============================================================

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.cdc_on_boot = 1
lib_deps =
    adafruit/Adafruit PWM Servo Driver Library@^3.0.2
    bblanchon/ArduinoJson@^7.0.0
    esp32async/ESPAsyncWebServer@^3.10.0

; ── USB upload (first flash) ──────────────────────
[env:usb]
upload_port = /dev/cu.usbmodem*
upload_speed = 921600
monitor_port = /dev/cu.usbmodem*

; ── OTA upload (after first flash) ────────────────
[env:ota]
upload_protocol = espota
upload_port = leddriver.local
upload_flags =
    --port=3232
