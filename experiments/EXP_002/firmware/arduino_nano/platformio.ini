[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328new
framework = arduino
upload_port = /dev/cu.usbserial-2130
upload_speed = 115200
monitor_speed = 115200
monitor_port = /dev/cu.usbserial-2130

; Some Nano clones use the old bootloader
; Uncomment the line below if upload fails:
; board_upload.speed = 57600
