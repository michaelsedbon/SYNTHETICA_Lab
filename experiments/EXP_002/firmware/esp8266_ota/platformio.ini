[env:nodemcuv2]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_port = /dev/cu.usbserial-2130
upload_speed = 115200
monitor_speed = 115200
monitor_port = /dev/cu.usbserial-2130
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    links2004/WebSockets@^2.4.1

; OTA upload settings (used after first USB flash)
[env:ota]
platform = espressif8266
board = nodemcuv2
framework = arduino
upload_protocol = espota
upload_port = cryptobeings.local
upload_flags =
    --port=8266
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    links2004/WebSockets@^2.4.1
