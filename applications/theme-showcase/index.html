<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Showcase — Synthetic Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        /* ── Reset & Base ──────────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #060606;
            color: #e0e0e0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ────────────────────────────────────────────────── */
        .header {
            text-align: center;
            padding: 48px 24px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #569cd6, #4ec9b0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            color: #888;
            font-size: 0.95rem;
        }

        .default-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(78, 201, 176, 0.12);
            border: 1px solid rgba(78, 201, 176, 0.25);
            font-size: 0.82rem;
            color: #4ec9b0;
            font-weight: 500;
        }

        .default-badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ec9b0;
        }

        /* ── Grid ──────────────────────────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 32px 24px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Theme Card ────────────────────────────────────────────── */
        .card {
            border-radius: 12px;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.07);
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.25s, box-shadow 0.25s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .card.selected {
            border-color: #4ec9b0;
            box-shadow: 0 0 0 1px #4ec9b0, 0 12px 40px rgba(78, 201, 176, 0.15);
        }

        .card .default-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 3px 10px;
            border-radius: 12px;
            background: rgba(78, 201, 176, 0.15);
            color: #4ec9b0;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: none;
        }

        .card.is-default .default-tag {
            display: block;
        }

        /* Swatch row */
        .swatches {
            display: flex;
            height: 80px;
        }

        .swatch {
            flex: 1;
            position: relative;
        }

        .swatch-label {
            position: absolute;
            bottom: 6px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.6rem;
            font-family: 'JetBrains Mono', monospace;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
            letter-spacing: 0.3px;
        }

        /* Card body */
        .card-body {
            padding: 16px 20px;
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }

        .card-desc {
            font-size: 0.78rem;
            color: #777;
            margin-bottom: 14px;
            line-height: 1.45;
        }

        .card-fonts {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .font-tag {
            padding: 3px 10px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 0.72rem;
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        /* ── Preview Panel ─────────────────────────────────────────── */
        .preview-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .preview-overlay.active {
            display: flex;
        }

        .preview-panel {
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.25s ease;
        }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .preview-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .preview-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 18px;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Inter', sans-serif;
        }

        .btn-default {
            background: #4ec9b0;
            color: #080808;
        }

        .btn-default:hover {
            background: #5ed9c0;
        }

        .btn-default.active {
            background: rgba(78, 201, 176, 0.15);
            color: #4ec9b0;
            border: 1px solid rgba(78, 201, 176, 0.3);
            cursor: default;
        }

        .btn-close {
            background: rgba(255, 255, 255, 0.08);
            color: #ccc;
        }

        .btn-close:hover {
            background: rgba(255, 255, 255, 0.14);
        }

        .preview-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
        }

        .preview-content::-webkit-scrollbar {
            width: 6px;
        }

        .preview-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .preview-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        /* Preview sample content */
        .sample-h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.03em;
        }

        .sample-h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-top: 28px;
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .sample-p {
            font-size: 0.92rem;
            line-height: 1.7;
            margin-bottom: 14px;
            opacity: 0.85;
        }

        .sample-code {
            border-radius: 8px;
            padding: 16px 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem;
            line-height: 1.6;
            margin: 16px 0;
            overflow-x: auto;
        }

        .sample-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.85rem;
        }

        .sample-table th {
            text-align: left;
            padding: 8px 12px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .sample-table td {
            padding: 8px 12px;
        }

        .sample-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .color-row {
            display: flex;
            gap: 12px;
            margin: 16px 0;
            flex-wrap: wrap;
        }

        .color-chip {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 4px;
            font-size: 0.55rem;
            font-family: 'JetBrains Mono', monospace;
            color: rgba(255, 255, 255, 0.7);
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* ── Animations ────────────────────────────────────────────── */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

                bestFor: 'Garden centers, food presentations, natural products.'
            },
            {
                id: 'midnight-galaxy',
                name: 'Midnight Galaxy',
                desc: 'Dramatic and cosmic deep tones for impactful presentations.',
                colors: [
                    { name: 'Deep Purple', hex: '#2b1e3e' },
                    { name: 'Cosmic Blue', hex: '#4a4e8f' },
                    { name: 'Lavender', hex: '#a490c2' },

                ],

                bodyFont: 'FreeSans',
                bestFor: 'Entertainment, gaming presentations, luxury brands.'
            }
        ];

        // ── State ──────────────────────────────────────────────────────
        let currentDefault = localStorage.getItem('theme-default') || null;

        // ── Helpers ────────────────────────────────────────────────────
        function luminance(hex) {
            const r = parseInt(hex.slice(1, 3), 16) / 255;
            const g = parseInt(hex.slice(3, 5), 16) / 255;
            const b = parseInt(hex.slice(5, 7), 16) / 255;
            return 0.299 * r + 0.587 * g + 0.114 * b;
        }
        function textColor(hex) { return luminance(hex) > 0.5 ? '#222' : '#eee'; }

        // ── Render Grid ────────────────────────────────────────────────
        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            THEMES.forEach(t => {
                const card = document.createElement('div');
                card.className = 'card' + (t.id === currentDefault ? ' is-default' : '');
                card.onclick = () => openPreview(t);
                card.innerHTML = `
      <div class="default-tag">★ DEFAULT</div>
      <div class="swatches">
        ${t.colors.map(c => `
          <div class="swatch" style="background:${c.hex}">
            <span class="swatch-label">${c.hex}</span>
          </div>
        `).join('')}
      </div>
      <div class="card-body">
        <div class="card-name">${t.name}</div>
        <div class="card-desc">${t.desc}</div>
        <div class="card-fonts">
          <span class="font-tag">H: ${t.headerFont}</span>
          <span class="font-tag">B: ${t.bodyFont}</span>
        </div>
      </div>
    `;
                grid.appendChild(card);
            });
            updateDefaultBadge();
        }

        function updateDefaultBadge() {
            const el = document.getElementById('default-name');
            if (currentDefault) {
                const t = THEMES.find(th => th.id === currentDefault);
                el.textContent = t ? `Default: ${t.name}` : 'No default set';
            } else {
                el.textContent = 'No default set';
            }
        }

        // ── Preview ────────────────────────────────────────────────────
        function openPreview(theme) {
            const overlay = document.getElementById('preview-overlay');
            const panel = document.getElementById('preview-panel');
            const title = document.getElementById('preview-title');
            const content = document.getElementById('preview-content');
            const header = document.getElementById('preview-header');
            const btn = document.getElementById('btn-set-default');

            const c = theme.colors;
            const bg = c[0].hex;
            const surface = c[1].hex;
            const accent1 = c[2].hex;
            const accent2 = c[3].hex;
            const fg = textColor(bg);
            const fgMuted = luminance(bg) > 0.5 ? '#666' : '#aaa';
            const borderC = luminance(bg) > 0.5 ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.08)';

            panel.style.background = bg;
            panel.style.border = `1px solid ${borderC}`;
            header.style.background = surface;
            header.style.borderColor = borderC;
            title.textContent = theme.name;
            title.style.color = fg;

            if (currentDefault === theme.id) {
                btn.textContent = '✓ Current Default';
                btn.className = 'btn btn-default active';
            } else {
                btn.textContent = 'Set as Default';
                btn.className = 'btn btn-default';
            }
            btn.style.background = currentDefault === theme.id ? `${accent1}22` : accent1;
            btn.style.color = currentDefault === theme.id ? accent1 : textColor(accent1);
            btn.onclick = () => {
                currentDefault = theme.id;
                localStorage.setItem('theme-default', theme.id);
                btn.textContent = '✓ Current Default';
                btn.className = 'btn btn-default active';
                btn.style.background = `${accent1}22`;
                btn.style.color = accent1;
                renderGrid();
            };

            content.innerHTML = `

      ${c.map(cl => `<div class="color-chip" style="background:${cl.hex}">${cl.hex}</div>`).join('')}
    </div>

    <div class="sample-h1" style="color:${fg}; font-family:'${theme.headerFont.replace(' Bold', '')}',Inter,sans-serif">
      Experiment EXP-003: Mycelium Spiking
    </div>
    <div class="sample-p" style="color:${fgMuted}; font-family:'${theme.bodyFont}',sans-serif">
      This experiment investigates the electrical spiking behavior of <em>Pleurotus ostreatus</em> mycelium in response to blue and UV light stimulation. We measure spontaneous activity, amplitude modulation, and frequency changes across a 12-hour protocol.
    </div>

    <div class="sample-h2" style="color:${accent1}; font-family:'${theme.headerFont.replace(' Bold', '')}',Inter,sans-serif">
      Key Findings
    </div>
    <div class="sample-p" style="color:${fgMuted}; font-family:'${theme.bodyFont}',sans-serif">
      Spontaneous spiking frequency measured at <strong style="color:${fg}">0.12 Hz</strong> with mean amplitude of <strong style="color:${fg}">135 µV</strong>. Blue light stimulation produced a <strong style="color:${accent2}">3–10× amplification</strong> in spike amplitude.
    </div>

    <table class="sample-table">
      <thead>
        <tr style="border-bottom: 2px solid ${borderC}">
          <th style="color:${fgMuted}">Parameter</th>
          <th style="color:${fgMuted}">Baseline</th>
          <th style="color:${fgMuted}">Stimulated</th>
          <th style="color:${fgMuted}">Status</th>
        </tr>
      </thead>
      <tbody>
        <tr style="border-bottom: 1px solid ${borderC}">
          <td style="color:${fg}">Frequency</td>
          <td style="color:${fgMuted}">0.12 Hz</td>
          <td style="color:${fgMuted}">0.18 Hz</td>
          <td><span class="sample-badge" style="background:${accent1}22; color:${accent1}">▲ 50%</span></td>
        </tr>
        <tr style="border-bottom: 1px solid ${borderC}">
          <td style="color:${fg}">Amplitude</td>
          <td style="color:${fgMuted}">135 µV</td>
          <td style="color:${fgMuted}">810 µV</td>
          <td><span class="sample-badge" style="background:${accent2}22; color:${accent2}">▲ 6×</span></td>
        </tr>
        <tr style="border-bottom: 1px solid ${borderC}">
          <td style="color:${fg}">Spike Width</td>
          <td style="color:${fgMuted}">1.1 s</td>
          <td style="color:${fgMuted}">1.3 s</td>
          <td><span class="sample-badge" style="background:${fgMuted}22; color:${fgMuted}">~ stable</span></td>
        </tr>
      </tbody>
    </table>

    <div class="sample-h2" style="color:${accent1}; font-family:'${theme.headerFont.replace(' Bold', '')}',Inter,sans-serif">
      Code Sample
    </div>
    <div class="sample-code" style="background:${surface}; border: 1px solid ${borderC}; color:${fg}">
<span style="color:${accent1}">def</span> <span style="color:${accent2}">spike_detect</span>(signal, threshold=<span style="color:${c[2].hex}">50</span>):
    <span style="color:${fgMuted}">"""Detect spikes above threshold in µV."""</span>
    peaks = []
    <span style="color:${accent1}">for</span> i, v <span style="color:${accent1}">in</span> enumerate(signal):
        <span style="color:${accent1}">if</span> v > threshold:
            peaks.append((i, v))
    <span style="color:${accent1}">return</span> peaks</div>

    <div class="sample-h2" style="color:${accent1}; font-family:'${theme.headerFont.replace(' Bold', '')}',Inter,sans-serif">
      Best Used For
    </div>
    <div class="sample-p" style="color:${fgMuted}; font-family:'${theme.bodyFont}',sans-serif">
      ${theme.bestFor}
    </div>
  `;

            overlay.classList.add('active');
        }

        document.getElementById('btn-close').onclick = () => {
            document.getElementById('preview-overlay').classList.remove('active');
        };
        document.getElementById('preview-overlay').onclick = (e) => {
            if (e.target === e.currentTarget) {
                e.currentTarget.classList.remove('active');
            }
        };
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.getElementById('preview-overlay').classList.remove('active');
            }
        });

        // ── Init ───────────────────────────────────────────────────────
        renderGrid();
    </script>
