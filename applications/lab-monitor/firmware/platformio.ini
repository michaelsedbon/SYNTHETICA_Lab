; Lab Monitor — ESP8266 Sensor Node (Wemos D1 Mini + DHT22)
; =========================================================
; Publishes temperature + humidity to MQTT every 30s.
; Includes OTA for wireless firmware updates.

[env]
platform = espressif8266
board = d1_mini
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14

build_flags =
    -D MQTT_MAX_PACKET_SIZE=256

; ── USB upload (first flash) ──
[env:usb]
upload_protocol = esptool
upload_speed = 460800

; ── OTA upload (subsequent flashes) ──
[env:ota]
upload_protocol = espota
upload_port = incubator-1.local
upload_flags =
    --port=8266
